<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bottom Nav Demo - 3 Tab</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #1a1d24;
    --surface: #22252d;
    --accent: #00e5ff;
    --gold: #ffd700;
    --text: #e0e0e0;
    --muted: #888;
    --border: rgba(255,255,255,0.08);
}
html, body { height: 100%; overflow: hidden; }
body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ==========================================
   Layout: full viewport grid
   ========================================== */
#app {
    display: grid;
    grid-template-rows: 40px 1fr auto auto;
    height: 100dvh;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
}

/* Top Bar */
#top-bar {
    display: flex; align-items: center;
    padding: 0 10px; gap: 8px;
    background: #0d0f14;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    z-index: 10;
}
#top-bar .game-name { flex: 1; font-weight: 600; color: var(--accent); }
#top-bar .game-info { color: var(--muted); font-size: 10px; }
.btn-hamburger {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; color: var(--text);
    padding: 4px 8px; font-size: 14px; cursor: pointer;
}
.hamburger-menu {
    position: absolute; right: 8px; top: 38px;
    background: #2a2d35; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 6px 0;
    min-width: 180px; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.hamburger-menu.hidden { display: none; }
.menu-item {
    display: block; width: 100%;
    padding: 10px 16px; font-size: 13px;
    background: none; border: none; color: var(--text);
    text-align: left; cursor: pointer;
    transition: background 0.15s;
}
.menu-item:hover { background: rgba(255,255,255,0.06); }

/* Table Area */
#table-area {
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    background: radial-gradient(ellipse at center, #1a3a2a 0%, var(--bg) 80%);
}
.table-felt {
    width: 90%; max-width: 380px; aspect-ratio: 1.8;
    background: radial-gradient(ellipse, #1e5a3a 0%, #14432a 60%, #0d2e1c 100%);
    border-radius: 50%; border: 3px solid #2a6b45;
    box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.3);
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.table-felt .pot {
    color: var(--gold); font-weight: 700; font-size: 16px;
    text-shadow: 0 0 8px rgba(255,215,0,0.3);
}
/* Demo seat markers */
.demo-seat {
    position: absolute; width: 36px; height: 36px;
    border-radius: 50%; background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted);
}
.demo-seat.s0 { bottom: -18px; left: 50%; transform: translateX(-50%); }
.demo-seat.s1 { bottom: 10%; left: 5%; }
.demo-seat.s2 { top: 10%; left: 5%; }
.demo-seat.s3 { top: -18px; left: 50%; transform: translateX(-50%); }
.demo-seat.s4 { top: 10%; right: 5%; }
.demo-seat.s5 { bottom: 10%; right: 5%; }
/* Player hand */
.player-hand {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
}
.demo-card {
    width: 36px; height: 52px; border-radius: 4px;
    background: #fff; border: 1px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #333;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.demo-card.red { color: #e53935; }

/* ==========================================
   Bottom Panel (replaces log-panel)
   - Controlled by bottom nav tabs
   ========================================== */
#bottom-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    overflow: hidden;
    transition: height 0.25s ease;
}
/* When action bar is visible, panel is behind it */
#bottom-panel .panel-content {
    height: 120px;
    overflow: hidden;
    position: relative;
}
.panel-view {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
}
.panel-view.active {
    opacity: 1;
    pointer-events: auto;
}

/* Chat View */
.chat-messages {
    flex: 1; overflow-y: auto;
    padding: 6px 10px;
    display: flex; flex-direction: column;
    font-size: 11px;
}
.chat-messages::before { content: ''; flex: 1; }
.chat-entry { padding: 2px 0; }
.chat-ts { color: #555; font-size: 9px; margin-right: 4px; }
.chat-name { color: var(--accent); font-weight: 600; }
.chat-text { color: #81c784; }

.chat-input-bar {
    display: flex; gap: 4px; padding: 4px 8px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
}
.chat-input-bar input {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px; padding: 6px 8px;
    color: var(--text); font-size: 12px; outline: none;
}
.chat-input-bar button {
    padding: 6px 12px; border-radius: 6px;
    background: rgba(0,229,255,0.15); border: 1px solid rgba(0,229,255,0.3);
    color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer;
}

/* Log View */
.log-messages {
    flex: 1; overflow-y: auto;
    padding: 6px 10px;
    display: flex; flex-direction: column;
    font-size: 11px; color: #aaa;
}
.log-messages::before { content: ''; flex: 1; }
.log-entry { padding: 1px 0; }
.log-entry.log-important { color: var(--gold); font-weight: 600; }
.log-entry.log-action { color: var(--accent); }
.log-entry.log-fold { color: #888; }
.log-entry.log-pot { color: #ce93d8; }

/* History View */
.history-list {
    flex: 1; overflow-y: auto;
    padding: 6px 10px;
}
.history-hand {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    transition: background 0.15s;
}
.history-hand:hover { background: rgba(255,255,255,0.08); }
.history-num {
    font-size: 10px; color: var(--muted);
    min-width: 24px; text-align: center;
}
.history-cards {
    display: flex; gap: 2px;
}
.history-card {
    width: 22px; height: 30px; border-radius: 2px;
    background: #fff; border: 1px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #333;
}
.history-card.red { color: #e53935; }
.history-result {
    flex: 1; text-align: right; font-size: 11px; font-weight: 600;
}
.history-result.win { color: #4caf50; }
.history-result.lose { color: #ef5350; }

/* Action Bar (overlays bottom panel when turn) */
#action-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 10px;
    display: flex; flex-direction: column; gap: 4px;
}
#action-bar.hidden { display: none; }
.action-buttons {
    display: flex; gap: 6px;
}
.btn-action {
    flex: 1; padding: 12px 8px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    position: relative; overflow: hidden;
}
.btn-fold { background: rgba(239,83,80,0.15); color: #ef5350; border-color: rgba(239,83,80,0.3); }
.btn-call { background: rgba(76,175,80,0.15); color: #4caf50; border-color: rgba(76,175,80,0.3); }
.btn-raise { background: rgba(0,229,255,0.12); color: var(--accent); border-color: rgba(0,229,255,0.3); }
.btn-action:active { transform: scale(0.96); }

/* ==========================================
   Bottom Navigation Bar (3 tabs)
   ========================================== */
#bottom-nav {
    display: flex;
    flex-shrink: 0;
    background: #0d0f14;
    border-top: 1px solid #2a2d35;
    padding: 2px 0 env(safe-area-inset-bottom, 2px);
}
.nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 1px; padding: 6px 4px;
    font-size: 10px; color: #666;
    cursor: pointer; transition: all 0.2s;
    background: none; border: none;
    position: relative;
}
.nav-item:active { transform: scale(0.92); }
.nav-item .nav-icon { font-size: 18px; line-height: 1; }
.nav-item .nav-label { font-weight: 500; }
.nav-item.active { color: var(--accent); }
.nav-item.active::after {
    content: '';
    position: absolute; top: 0; left: 20%; right: 20%;
    height: 2px; border-radius: 1px;
    background: var(--accent);
}
.nav-badge {
    position: absolute; top: 2px; right: 50%; transform: translateX(16px);
    background: #ef5350; color: #fff;
    font-size: 8px; font-weight: 700;
    min-width: 14px; height: 14px;
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    padding: 0 3px;
}
.nav-badge.hidden { display: none; }

/* ==========================================
   Demo controls
   ========================================== */
.demo-controls {
    position: fixed; top: 8px; right: 8px; z-index: 200;
    display: flex; flex-direction: column; gap: 4px;
}
.demo-btn {
    padding: 6px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); font-size: 10px; cursor: pointer;
    transition: background 0.15s;
}
.demo-btn:hover { background: rgba(255,255,255,0.15); }
.demo-btn.active { background: rgba(0,229,255,0.2); border-color: rgba(0,229,255,0.4); color: var(--accent); }
</style>
</head>
<body>

<div class="demo-controls">
    <button class="demo-btn" id="btn-toggle-action">アクションバー ON/OFF</button>
    <button class="demo-btn" id="btn-add-chat">チャット追加</button>
    <button class="demo-btn" id="btn-add-log">ログ追加</button>
</div>

<div id="app">
    <!-- Top Bar -->
    <div id="top-bar">
        <span class="game-name">NLH</span>
        <span class="game-info">100/200 ・ 6人</span>
        <div style="flex:1"></div>
        <button class="btn-hamburger" id="btn-hamburger">☰</button>
        <div class="hamburger-menu hidden" id="hamburger-menu">
            <button class="menu-item">📊 Stats</button>
            <button class="menu-item">🔔 サウンド</button>
            <button class="menu-item">🎯 フォーカス OFF</button>
            <button class="menu-item">🎨 テーマ</button>
            <button class="menu-item">🎚️ プリセット設定</button>
            <button class="menu-item">❓ ルール</button>
            <button class="menu-item" style="color:#ef5350">🚪 退出</button>
        </div>
    </div>

    <!-- Table Area -->
    <div id="table-area">
        <div class="table-felt">
            <div class="pot">Pot: 1,200</div>
            <div class="demo-seat s0">You</div>
            <div class="demo-seat s1">P2</div>
            <div class="demo-seat s2">P3</div>
            <div class="demo-seat s3">P4</div>
            <div class="demo-seat s4">P5</div>
            <div class="demo-seat s5">P6</div>
        </div>
        <div class="player-hand">
            <div class="demo-card red">A♥</div>
            <div class="demo-card">K♠</div>
        </div>
    </div>

    <!-- Bottom Panel (tab content area - replaces old log-panel) -->
    <div id="bottom-panel">
        <div class="panel-content">
            <!-- Chat View -->
            <div class="panel-view active" id="view-chat">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-bar">
                    <input type="text" placeholder="チャット..." maxlength="200">
                    <button>送信</button>
                </div>
            </div>
            <!-- Log View -->
            <div class="panel-view" id="view-log">
                <div class="log-messages" id="log-messages"></div>
            </div>
            <!-- History View -->
            <div class="panel-view" id="view-history">
                <div class="history-list" id="history-list"></div>
            </div>
        </div>
    </div>

    <!-- Action Bar (shown on your turn, overlays bottom panel) -->
    <div id="action-bar" class="hidden">
        <div class="action-buttons">
            <button class="btn-action btn-fold">フォールド</button>
            <button class="btn-action btn-call">コール 400</button>
            <button class="btn-action btn-raise">レイズ 1,000</button>
        </div>
    </div>

    <!-- Bottom Nav (3 tabs) -->
    <nav id="bottom-nav">
        <button class="nav-item active" data-tab="chat">
            <span class="nav-icon">💬</span><span class="nav-label">チャット</span>
            <span class="nav-badge hidden" id="nav-chat-badge">0</span>
        </button>
        <button class="nav-item" data-tab="log">
            <span class="nav-icon">📋</span><span class="nav-label">ログ</span>
        </button>
        <button class="nav-item" data-tab="history">
            <span class="nav-icon">🕐</span><span class="nav-label">履歴</span>
        </button>
    </nav>
</div>

<script>
// ==========================================
// Bottom Nav Tab Switching
// ==========================================
const nav = document.getElementById('bottom-nav');
const views = {
    chat: document.getElementById('view-chat'),
    log: document.getElementById('view-log'),
    history: document.getElementById('view-history')
};
let activeTab = 'chat';
let chatUnread = 0;

nav.addEventListener('click', (e) => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    const tab = item.dataset.tab;
    switchTab(tab);
});

function switchTab(tab) {
    activeTab = tab;
    // Update nav active
    nav.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
    // Switch views
    Object.entries(views).forEach(([key, view]) => {
        view.classList.toggle('active', key === tab);
    });
    // Clear chat badge when switching to chat
    if (tab === 'chat') {
        chatUnread = 0;
        updateChatBadge();
    }
    // Scroll to bottom
    if (tab === 'chat') {
        const msgs = document.getElementById('chat-messages');
        msgs.scrollTop = msgs.scrollHeight;
    } else if (tab === 'log') {
        const msgs = document.getElementById('log-messages');
        msgs.scrollTop = msgs.scrollHeight;
    }
}

function updateChatBadge() {
    const badge = document.getElementById('nav-chat-badge');
    if (chatUnread > 0) {
        badge.classList.remove('hidden');
        badge.textContent = chatUnread > 99 ? '99+' : chatUnread;
    } else {
        badge.classList.add('hidden');
    }
}

// ==========================================
// Hamburger menu
// ==========================================
const hamburgerBtn = document.getElementById('btn-hamburger');
const hamburgerMenu = document.getElementById('hamburger-menu');
hamburgerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    hamburgerMenu.classList.toggle('hidden');
});
document.addEventListener('click', (e) => {
    if (!hamburgerMenu.contains(e.target) && e.target !== hamburgerBtn) {
        hamburgerMenu.classList.add('hidden');
    }
});

// ==========================================
// Demo: populate data
// ==========================================
const chatNames = ['Alice', 'Bob', 'Charlie', 'You'];
const chatMsgs = ['よろしく！', 'gg', 'ナイスハンド！', 'えぐい…', 'すごい！', 'こわ！', 'ラッキー', 'どんまい'];
const logEntries = [
    { text: 'ハンド #42 開始 — NL Hold\'em', cls: 'log-important' },
    { text: 'Alice (SB) 50', cls: '' },
    { text: 'Bob (BB) 100', cls: '' },
    { text: 'Charlie フォールド', cls: 'log-fold' },
    { text: 'You レイズ 300', cls: 'log-action' },
    { text: 'Alice コール 300', cls: '' },
    { text: 'Bob フォールド', cls: 'log-fold' },
    { text: 'フロップ: A♥ K♠ 7♦', cls: 'log-important' },
    { text: 'Alice チェック', cls: '' },
    { text: 'You ベット 400', cls: 'log-action' },
    { text: 'Alice コール 400', cls: '' },
    { text: 'ターン: 3♣', cls: 'log-important' },
    { text: 'ポット: 1,200', cls: 'log-pot' },
];
const historyHands = [
    { num: '#42', cards: ['A♥', 'K♠'], result: '+800', win: true },
    { num: '#41', cards: ['7♣', '7♦'], result: '-300', win: false },
    { num: '#40', cards: ['Q♠', 'J♠'], result: '+150', win: true },
    { num: '#39', cards: ['9♥', '8♥'], result: '-100', win: false },
    { num: '#38', cards: ['A♠', 'A♣'], result: '+2,400', win: true },
    { num: '#37', cards: ['K♥', 'Q♦'], result: '-200', win: false },
    { num: '#36', cards: ['5♠', '5♦'], result: '+50', win: true },
];

function ts() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

// Populate initial chat
function addChat(name, text) {
    const el = document.createElement('div');
    el.className = 'chat-entry';
    el.innerHTML = `<span class="chat-ts">${ts()}</span> <span class="chat-name">${name}:</span> <span class="chat-text">${text}</span>`;
    document.getElementById('chat-messages').appendChild(el);
    document.getElementById('chat-messages').scrollTop = 99999;
    // Update badge if not on chat tab
    if (activeTab !== 'chat') {
        chatUnread++;
        updateChatBadge();
    }
}

function addLog(text, cls) {
    const el = document.createElement('div');
    el.className = 'log-entry' + (cls ? ` ${cls}` : '');
    el.textContent = text;
    document.getElementById('log-messages').appendChild(el);
    document.getElementById('log-messages').scrollTop = 99999;
}

// Initial data
addChat('Alice', 'よろしく！');
addChat('Bob', 'gg');
addChat('You', 'よろしく！');
addChat('Charlie', 'ナイスハンド！');
addChat('Alice', 'どんまい');

logEntries.forEach(e => addLog(e.text, e.cls));

// History
const historyList = document.getElementById('history-list');
historyHands.forEach(h => {
    const el = document.createElement('div');
    el.className = 'history-hand';
    const isRed = (c) => c.includes('♥') || c.includes('♦');
    el.innerHTML = `
        <span class="history-num">${h.num}</span>
        <div class="history-cards">
            ${h.cards.map(c => `<div class="history-card${isRed(c) ? ' red' : ''}">${c}</div>`).join('')}
        </div>
        <span class="history-result ${h.win ? 'win' : 'lose'}">${h.result}</span>
    `;
    historyList.appendChild(el);
});

// ==========================================
// Demo controls
// ==========================================
document.getElementById('btn-toggle-action').addEventListener('click', () => {
    const bar = document.getElementById('action-bar');
    bar.classList.toggle('hidden');
    document.getElementById('btn-toggle-action').classList.toggle('active', !bar.classList.contains('hidden'));
});

document.getElementById('btn-add-chat').addEventListener('click', () => {
    const name = chatNames[Math.floor(Math.random() * chatNames.length)];
    const msg = chatMsgs[Math.floor(Math.random() * chatMsgs.length)];
    addChat(name, msg);
});

document.getElementById('btn-add-log').addEventListener('click', () => {
    const e = logEntries[Math.floor(Math.random() * logEntries.length)];
    addLog(e.text, e.cls);
});
</script>
</body>
</html>
