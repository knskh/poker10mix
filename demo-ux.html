<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Demo - Action Feedback & Bottom Nav</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #1a1d24;
    --accent: #00e5ff;
    --gold: #ffd700;
    --text: #e0e0e0;
    --text-dim: #888;
}
body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh; overflow: hidden;
    display: grid;
    grid-template-rows: 40px 30px 1fr auto auto;
}

/* ==========================================
   Header
   ========================================== */
.top-bar {
    display: flex; align-items: center; padding: 8px 12px;
    background: #111318; border-bottom: 1px solid #2a2d35;
    gap: 8px;
}
.top-bar .game-name { font-size: 14px; font-weight: 700; }
.top-bar .game-info { font-size: 11px; color: var(--text-dim); }

/* ==========================================
   Table Area
   ========================================== */
.table-area {
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; min-height: 0;
    background: radial-gradient(ellipse at center, #2a2520 0%, #1a1d24 60%);
}
.table-wrapper {
    position: relative; display: flex; flex-direction: column; align-items: center;
    transform: scale(var(--table-scale, 1)); transform-origin: center center;
}
.table-felt {
    width: 240px; height: 130px;
    background: radial-gradient(ellipse, #1b5e20 0%, #0d3010 70%);
    border: 2px solid #3e2723;
    border-radius: 65px; position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 4px 15px rgba(0,0,0,0.4);
}

/* Pot */
.pot-display {
    position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 700; color: var(--gold);
    text-shadow: 0 0 6px rgba(255,215,0,0.3);
}

/* Community cards */
.community-cards {
    position: absolute; top: 42%; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
}
.card {
    width: 26px; height: 36px; border-radius: 3px;
    background: #fff; border: 1px solid #ccc;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; line-height: 1;
}
.card.heart, .card.diamond { color: #e53935; }
.card.spade, .card.club { color: #222; }

/* Seats */
.seat {
    position: absolute; width: 54px; padding: 3px;
    background: rgba(0,0,0,0.6); border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 8px; text-align: center; font-size: 9px; color: #ccc;
}
.seat.active-turn { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,229,255,0.4); }
.seat-name { font-weight: 600; font-size: 9px; }
.seat-chips { font-size: 8px; color: var(--gold); }
.seat-0 { bottom: -24px; left: 50%; transform: translateX(-50%); }
.seat-1 { top: 50%; left: -8px; transform: translateY(-50%); }
.seat-2 { top: -24px; left: 30%; transform: translateX(-50%); }
.seat-3 { top: -24px; right: 30%; transform: translateX(50%); }
.seat-4 { top: 50%; right: -8px; transform: translateY(-50%); }

/* Player hand */
.player-hand {
    display: flex; gap: 4px; z-index: 10; margin-top: 8px;
}
.player-hand .card { width: 30px; height: 40px; font-size: 11px; }

/* ==========================================
   Turn flash (案2)
   ========================================== */
.turn-flash {
    position: absolute; inset: 0; pointer-events: none; z-index: 50;
    opacity: 0;
}
.turn-flash.flash-active {
    animation: turn-flash-anim 0.8s ease-out;
}
@keyframes turn-flash-anim {
    0% { opacity: 0; box-shadow: inset 0 0 60px 20px rgba(0,229,255,0.5); }
    30% { opacity: 1; box-shadow: inset 0 0 40px 10px rgba(0,229,255,0.3); }
    100% { opacity: 0; box-shadow: inset 0 0 0 0 transparent; }
}

/* ==========================================
   Fold card animation (案2)
   ========================================== */
.card.fold-anim {
    animation: fold-fly 0.6s ease-in forwards;
}
@keyframes fold-fly {
    0% { transform: rotateY(0) scale(1); opacity: 1; }
    40% { transform: rotateY(90deg) scale(0.8); opacity: 0.8; }
    60% { transform: rotateY(90deg) scale(0.8) translateY(-30px); opacity: 0.6; }
    100% { transform: rotateY(180deg) scale(0.3) translateY(-80px); opacity: 0; }
}

/* ==========================================
   Chip fly to winner (案2)
   ========================================== */
.chip-fly {
    position: absolute; z-index: 100;
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, #ffd700, #ff8f00);
    border: 2px solid #fff;
    font-size: 7px; font-weight: 900; color: #333;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    animation: chip-fly-anim 0.8s ease-in-out forwards;
}
@keyframes chip-fly-anim {
    0% { transform: scale(1); opacity: 1; }
    70% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(0.6); opacity: 0; }
}

/* ==========================================
   Ripple effect on buttons (案2)
   ========================================== */
.btn-action {
    position: relative; overflow: hidden;
}
.ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: ripple-expand 0.5s ease-out;
    pointer-events: none;
}
@keyframes ripple-expand {
    to { transform: scale(3); opacity: 0; }
}

/* ==========================================
   Action panel
   ========================================== */
.action-panel {
    flex-shrink: 0; background: #111318;
    border-top: 1px solid #2a2d35;
    padding: 6px 10px;
}
.action-row {
    display: flex; gap: 8px;
}
.btn-action {
    flex: 1; padding: 10px 6px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    text-align: center;
}
.btn-fold { background: rgba(239,83,80,0.2); color: #ef5350; border-color: rgba(239,83,80,0.3); }
.btn-call { background: rgba(76,175,80,0.2); color: #4caf50; border-color: rgba(76,175,80,0.3); }
.btn-raise { background: rgba(0,229,255,0.15); color: var(--accent); border-color: rgba(0,229,255,0.3); }
.btn-fold:active { background: rgba(239,83,80,0.4); }
.btn-call:active { background: rgba(76,175,80,0.4); }
.btn-raise:active { background: rgba(0,229,255,0.3); }

/* ==========================================
   Bottom Navigation (案3)
   ========================================== */
.bottom-nav {
    display: flex; flex-shrink: 0;
    background: #0d0f14;
    border-top: 1px solid #2a2d35;
    padding: 4px 0 env(safe-area-inset-bottom, 4px);
}
.nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 1px; padding: 4px 4px;
    font-size: 9px; color: #666;
    cursor: pointer; transition: all 0.2s;
    background: none; border: none;
    position: relative;
}
.nav-item:active { transform: scale(0.92); }
.nav-item .nav-icon { font-size: 18px; line-height: 1; }
.nav-item .nav-label { font-weight: 500; }
.nav-item.active {
    color: var(--accent);
}
.nav-item.active::after {
    content: '';
    position: absolute; top: 0; left: 25%; right: 25%;
    height: 2px; border-radius: 1px;
    background: var(--accent);
}
.nav-badge {
    position: absolute; top: 2px; right: 50%; transform: translateX(14px);
    background: #ef5350; color: #fff;
    font-size: 8px; font-weight: 700;
    min-width: 14px; height: 14px;
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    padding: 0 3px;
}

/* ==========================================
   Demo controls
   ========================================== */
.demo-controls {
    display: flex; flex-shrink: 0; gap: 3px;
    padding: 4px 8px; background: #0d0f14;
    justify-content: center; flex-wrap: wrap;
    border-bottom: 1px solid #2a2d35;
}
.demo-btn {
    padding: 4px 8px; font-size: 9px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; color: #ccc; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
}
.demo-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
.demo-label { font-size: 8px; color: #555; text-align: center; display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="top-bar">
    <span class="game-name">No-Limit Hold'em</span>
    <span class="game-info">1/3 | Hand 2/4</span>
</div>

<!-- Demo controls -->
<div class="demo-controls">
    <button class="demo-btn" id="demo-turn">ターンフラッシュ</button>
    <button class="demo-btn" id="demo-fold">フォールド</button>
    <button class="demo-btn" id="demo-chips">チップ獲得</button>
    <button class="demo-btn" id="demo-all">全再生</button>
</div>

<!-- Table -->
<div class="table-area" id="table-area">
    <div class="turn-flash" id="turn-flash"></div>
    <div class="table-wrapper">
    <div class="table-felt" id="table-felt">
        <div class="pot-display" id="pot-display">Pot 1,200</div>
        <div class="community-cards">
            <div class="card heart"><span>A</span><span>♥</span></div>
            <div class="card spade"><span>K</span><span>♠</span></div>
            <div class="card diamond"><span>7</span><span>♦</span></div>
        </div>
        <div class="seat seat-0 active-turn">
            <div class="seat-name">自分</div>
            <div class="seat-chips">8,500</div>
        </div>
        <div class="seat seat-1">
            <div class="seat-name">Player2</div>
            <div class="seat-chips">12,000</div>
        </div>
        <div class="seat seat-2">
            <div class="seat-name">Player3</div>
            <div class="seat-chips">5,200</div>
        </div>
        <div class="seat seat-3">
            <div class="seat-name">Player4</div>
            <div class="seat-chips">9,800</div>
        </div>
        <div class="seat seat-4">
            <div class="seat-name">Player5</div>
            <div class="seat-chips">7,100</div>
        </div>
    </div>

    <!-- Player hand -->
    <div class="player-hand" id="player-hand">
        <div class="card heart" id="hand-card-1"><span>Q</span><span>♥</span></div>
        <div class="card heart" id="hand-card-2"><span>J</span><span>♥</span></div>
    </div>
    </div><!-- /table-wrapper -->
</div>

<!-- Action Panel -->
<div class="action-panel" id="action-panel">
    <div class="action-row">
        <button class="btn-action btn-fold" id="btn-fold">フォールド</button>
        <button class="btn-action btn-call" id="btn-call">コール 400</button>
        <button class="btn-action btn-raise" id="btn-raise">レイズ 1,200</button>
    </div>
</div>

<!-- Bottom Navigation (案3) -->
<nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-tab="table">
        <span class="nav-icon">🃏</span>
        <span class="nav-label">テーブル</span>
    </button>
    <button class="nav-item" data-tab="chat">
        <span class="nav-icon">💬</span>
        <span class="nav-label">チャット</span>
        <span class="nav-badge" id="chat-badge">3</span>
    </button>
    <button class="nav-item" data-tab="history">
        <span class="nav-icon">📋</span>
        <span class="nav-label">履歴</span>
    </button>
    <button class="nav-item" data-tab="stats">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
    </button>
    <button class="nav-item" data-tab="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">設定</span>
    </button>
</nav>


<script>
// ==========================================
// Ripple effect (案2)
// ==========================================
document.querySelectorAll('.btn-action').forEach(btn => {
    btn.addEventListener('click', (e) => {
        const rect = btn.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        btn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());

        // Vibration feedback
        if (navigator.vibrate) navigator.vibrate(30);
    });
});

// ==========================================
// Turn flash (案2)
// ==========================================
function triggerTurnFlash() {
    const flash = document.getElementById('turn-flash');
    flash.classList.remove('flash-active');
    void flash.offsetWidth;
    flash.classList.add('flash-active');
}

// ==========================================
// Fold animation (案2)
// ==========================================
function triggerFoldAnim() {
    const cards = document.querySelectorAll('#player-hand .card');
    cards.forEach((card, i) => {
        card.classList.remove('fold-anim');
        void card.offsetWidth;
        card.style.animationDelay = (i * 0.1) + 's';
        card.classList.add('fold-anim');
    });
    // Restore after animation
    setTimeout(() => {
        cards.forEach(card => {
            card.classList.remove('fold-anim');
            card.style.animationDelay = '';
        });
    }, 1200);
}

// ==========================================
// Chip fly to winner (案2)
// ==========================================
function triggerChipFly() {
    const pot = document.getElementById('pot-display');
    const mySeat = document.querySelector('.seat-0');
    const potRect = pot.getBoundingClientRect();
    const seatRect = mySeat.getBoundingClientRect();
    const tableArea = document.getElementById('table-area');
    const areaRect = tableArea.getBoundingClientRect();

    for (let i = 0; i < 6; i++) {
        setTimeout(() => {
            const chip = document.createElement('div');
            chip.className = 'chip-fly';
            chip.textContent = '$';
            const startX = potRect.left - areaRect.left + potRect.width / 2 - 10 + (Math.random() - 0.5) * 30;
            const startY = potRect.top - areaRect.top + potRect.height / 2 - 10;
            const endX = seatRect.left - areaRect.left + seatRect.width / 2 - 10;
            const endY = seatRect.top - areaRect.top + seatRect.height / 2 - 10;

            chip.style.left = startX + 'px';
            chip.style.top = startY + 'px';
            chip.animate([
                { left: startX + 'px', top: startY + 'px', opacity: 1, transform: 'scale(1)' },
                { left: endX + 'px', top: endY + 'px', opacity: 0.3, transform: 'scale(0.5)' }
            ], { duration: 600 + i * 50, easing: 'ease-in-out', fill: 'forwards' });

            tableArea.appendChild(chip);
            setTimeout(() => chip.remove(), 800 + i * 50);
        }, i * 80);
    }

    // Flash pot text
    pot.style.transition = 'opacity 0.3s';
    setTimeout(() => {
        pot.textContent = 'Pot 0';
        pot.style.opacity = '0.3';
        setTimeout(() => {
            pot.textContent = 'Pot 1,200';
            pot.style.opacity = '1';
        }, 800);
    }, 500);
}

// ==========================================
// Bottom nav (案3)
// ==========================================
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');

        // Clear badge on chat
        if (item.dataset.tab === 'chat') {
            const badge = document.getElementById('chat-badge');
            if (badge) badge.style.display = 'none';
        }

        // Visual feedback
        if (navigator.vibrate) navigator.vibrate(10);
    });
});

// Fold button triggers fold anim
document.getElementById('btn-fold').addEventListener('click', () => {
    triggerFoldAnim();
});

// Raise/Call button triggers ripple only (handled above)

// ==========================================
// Demo controls
// ==========================================
// Auto-scale table to fit
function autoScaleTable() {
    const area = document.getElementById('table-area');
    const wrapper = document.querySelector('.table-wrapper');
    if (!area || !wrapper) return;
    wrapper.style.setProperty('--table-scale', '1');
    const aH = area.clientHeight;
    const wH = wrapper.scrollHeight;
    if (wH > aH && aH > 0) {
        wrapper.style.setProperty('--table-scale', String(Math.max(0.5, aH / wH)));
    }
}
autoScaleTable();
window.addEventListener('resize', autoScaleTable);

document.getElementById('demo-turn').addEventListener('click', triggerTurnFlash);
document.getElementById('demo-fold').addEventListener('click', triggerFoldAnim);
document.getElementById('demo-chips').addEventListener('click', triggerChipFly);
document.getElementById('demo-all').addEventListener('click', () => {
    triggerTurnFlash();
    setTimeout(triggerFoldAnim, 400);
    setTimeout(triggerChipFly, 1200);
});
</script>
</body>
</html>
