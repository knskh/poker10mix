<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Game Mix Poker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="connection-status" class="connection-status hidden"></div>

        <!-- Login Screen -->
        <div id="login-screen">
            <h1>10-Game Mix Poker</h1>
            <div class="login-box">
                <!-- Tab Switcher -->
                <div class="login-tabs">
                    <button id="tab-guest" class="login-tab active">ゲスト</button>
                    <button id="tab-account" class="login-tab">アカウント</button>
                </div>

                <!-- Guest Login -->
                <div id="login-guest-form">
                    <p class="login-hint">名前を入力して参加</p>
                    <input type="text" id="login-name" placeholder="名前" maxlength="20" autocomplete="off">
                    <button id="btn-enter" class="btn-primary">ゲストで入室</button>
                </div>

                <!-- Account Login / Register -->
                <div id="login-account-form" class="hidden">
                    <div class="account-mode-tabs">
                        <button id="tab-login" class="account-tab active">ログイン</button>
                        <button id="tab-register" class="account-tab">新規登録</button>
                    </div>
                    <div id="login-error" class="login-error hidden"></div>
                    <input type="text" id="account-name" placeholder="名前" maxlength="20" autocomplete="username">
                    <input type="email" id="account-email" placeholder="メールアドレス" autocomplete="email">
                    <input type="password" id="account-password" placeholder="パスワード" autocomplete="current-password">
                    <button id="btn-account-submit" class="btn-primary">ログイン</button>
                </div>
            </div>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="hidden">
            <div class="lobby-header">
                <h1>10-Game Mix Poker</h1>
                <div class="lobby-user">
                    <span id="lobby-username"></span>
                    <button id="btn-lobby-stats" class="btn-small">Stats</button>
                    <button id="btn-lobby-history" class="btn-small">履歴</button>
                    <button id="btn-logout">ログアウト</button>
                </div>
            </div>
            <div class="lobby-body">
                <div class="lobby-rooms">
                    <h2>ルーム一覧</h2>
                    <div class="room-actions">
                        <button id="btn-create-room" class="btn-primary">ルーム作成</button>
                        <button id="btn-join-zoom" class="btn-primary btn-zoom">Zoom卓に参加</button>
                        <div class="join-by-id">
                            <input type="text" id="room-id-input" placeholder="ルームID" maxlength="4" style="text-transform:uppercase">
                            <button id="btn-join-by-id" class="btn-small">参加</button>
                        </div>
                        <button id="btn-refresh-rooms" class="btn-small">更新</button>
                    </div>
                    <table class="room-list-table">
                        <thead><tr><th>ID</th><th>ホスト</th><th>人数</th><th>状態</th></tr></thead>
                        <tbody id="room-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Room Screen (Waiting Room) -->
        <div id="room-screen" class="hidden">
            <div class="room-header">
                <h1>ルーム <span id="room-id-display"></span></h1>
                <span id="room-player-count"></span>
                <button id="btn-leave-room" class="btn-small btn-danger">退出</button>
            </div>
            <div class="room-body">
                <div class="room-players">
                    <h2>プレイヤー</h2>
                    <ul id="room-player-list"></ul>
                </div>
                <div id="room-host-controls" class="room-settings">
                    <h2>ゲーム設定</h2>
                    <h3>ゲーム選択（最低2つ）</h3>
                    <div id="room-game-checkboxes"></div>
                    <div class="lobby-options">
                        <label>開始チップ: <select id="room-starting-chips">
                            <option value="5000">5,000</option>
                            <option value="10000" selected>10,000</option>
                            <option value="20000">20,000</option>
                            <option value="50000">50,000</option>
                        </select></label>
                    </div>
                    <button id="btn-start-game" class="btn-primary btn-large">ゲーム開始</button>
                </div>
                <div id="room-waiting-msg" class="room-waiting" style="display:none">
                    <p>ホストがゲームを開始するのを待っています...</p>
                </div>
            </div>
            <!-- Chat in room -->
            <div class="chat-bar">
                <input type="text" id="chat-input" placeholder="チャット..." maxlength="200" autocomplete="off">
                <button id="btn-chat-send" class="btn-small">送信</button>
            </div>
        </div>

        <!-- Stats Modal -->
        <div id="stats-modal" class="hidden">
            <div class="stats-modal-inner">
                <div class="stats-header">
                    <h2>ポーカースタッツ</h2>
                    <button id="btn-stats-close" class="btn-small">閉じる</button>
                </div>
                <div id="stats-table-container"></div>
            </div>
        </div>

        <!-- Hand History Modal -->
        <div id="history-modal" class="hidden">
            <div class="stats-modal-inner">
                <div class="stats-header">
                    <h2>ハンド履歴（直近30ハンド）</h2>
                    <button id="btn-history-close" class="btn-small">閉じる</button>
                </div>
                <div id="lobby-hand-history" class="hand-history-list"></div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div id="top-bar">
                <div id="game-name"></div>
                <div id="game-rotation"></div>
                <div id="turn-timer" class="hidden"></div>
                <button id="btn-ingame-stats" class="btn-tiny">Stats</button>
                <button id="btn-back-room" class="btn-tiny">退出</button>
                <button id="btn-zoom-sitout" class="btn-tiny hidden">離席</button>
                <button id="btn-zoom-exit" class="btn-tiny btn-danger hidden">Zoom退出</button>
                <div id="game-rules-btn" title="ルール表示">?</div>
            </div>

            <div id="rules-modal" class="hidden">
                <div id="rules-content"></div>
                <button id="rules-close" class="btn-small">閉じる</button>
            </div>

            <div id="table-area">
                <div id="table-container">
                    <div id="table-felt">
                        <div id="pot-display"></div>
                        <div id="table-info"></div>
                        <div id="community-cards" class="card-row"></div>
                        <div id="seat-0" class="seat seat-bottom"></div>
                        <div id="seat-1" class="seat seat-bottom-left"></div>
                        <div id="seat-2" class="seat seat-top-left"></div>
                        <div id="seat-3" class="seat seat-top"></div>
                        <div id="seat-4" class="seat seat-top-right"></div>
                        <div id="seat-5" class="seat seat-bottom-right"></div>
                    </div>
                    <div id="player-hand">
                        <div id="player-cards" class="card-row"></div>
                    </div>
                </div>
            </div>

            <div id="action-bar" class="hidden">
                <div id="action-buttons"></div>
                <div id="bet-presets" class="hidden"></div>
                <div id="bet-slider-area" class="hidden">
                    <input type="range" id="bet-slider" min="0" max="10000" step="50">
                    <span id="bet-amount-display">0</span>
                </div>
            </div>

            <div id="draw-action-bar" class="hidden">
                <div class="draw-hint">交換するカードをクリックして選択</div>
                <button id="btn-draw" class="btn-action">ドロー</button>
                <button id="btn-stand-pat" class="btn-action">スタンドパット</button>
            </div>

            <div id="zoom-waiting-overlay" class="hidden">
                <div class="zoom-waiting-inner">
                    <div class="zoom-waiting-icon">Z</div>
                    <p>次のハンドを待っています...</p>
                    <span class="zoom-waiting-hint">フォールド済み - 新しいハンドが自動的に開始されます</span>
                </div>
            </div>

            <div id="zoom-sitout-overlay" class="hidden">
                <div class="zoom-sitout-inner">
                    <h2>離席中</h2>
                    <div class="zoom-sitout-buttons">
                        <button id="btn-zoom-rejoin" class="btn-primary">テーブルに復帰</button>
                        <button id="btn-zoom-lobby" class="btn-small btn-danger">ロビーに戻る</button>
                    </div>
                    <div class="hand-history-section">
                        <h3>ハンド履歴（直近30ハンド）</h3>
                        <div id="zoom-hand-history" class="hand-history-list"></div>
                    </div>
                </div>
            </div>

            <div id="game-log"></div>
        </div>
    </div>

    <script src="js/deck.js"></script>
    <script src="js/evaluator.js"></script>
    <script src="js/game.js"></script>
    <script src="js/client.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
